<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MongoDB Utils</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="app" class="hidden">
      <header class="border-b bg-white">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
          <div class="flex items-center gap-6">
            <h1 class="font-semibold tracking-tight">MongoDB Utils</h1>
            <nav class="flex gap-1 text-sm">
              <button data-tab="connections" class="tab px-3 py-1.5 rounded-md hover:bg-slate-100">Connections</button>
              <button data-tab="backups" class="tab px-3 py-1.5 rounded-md hover:bg-slate-100">Backups</button>
              <button data-tab="restore" class="tab px-3 py-1.5 rounded-md hover:bg-slate-100">Restore</button>
            </nav>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <span id="who" class="text-slate-500"></span>
            <button id="logout" class="px-3 py-1.5 rounded-md border hover:bg-slate-100">Sign out</button>
          </div>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-4 py-6">
        <div id="jobs-panel" class="hidden mb-4 bg-white border rounded-lg p-3"></div>
        <section id="view-connections" class="view"></section>
        <section id="view-backups" class="view hidden"></section>
        <section id="view-restore" class="view hidden"></section>
      </main>
    </div>

    <div id="loading" class="min-h-screen flex items-center justify-center text-slate-500">Loading…</div>

    <div id="toast" class="fixed bottom-4 right-4 hidden bg-slate-900 text-white text-sm px-3 py-2 rounded-md shadow-lg"></div>

    <script src="/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — MongoDB Utils</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/tailwind-config.js"></script>
    <link rel="stylesheet" href="/app.css" />
    <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
  </head>
  <body class="auth-page">
    <div class="w-full max-w-sm">
      <div class="auth-brand">
        <div class="sidebar-brand-mark"><i data-lucide="database" data-size="16"></i></div>
        <span class="sidebar-brand-text">MongoUtils</span>
      </div>

      <div class="auth-card">
        <div>
          <h1 class="auth-title">Sign in</h1>
          <p class="auth-sub">Self-hosted MongoDB backups</p>
        </div>

        <form id="form" class="mt-6 space-y-4" novalidate>
          <div>
            <label class="field-label" for="username">Username</label>
            <input id="username" name="username" autocomplete="username" required class="input" />
          </div>
          <div>
            <label class="field-label" for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required class="input" />
          </div>
          <p id="err" class="hidden field-error" style="margin-top:0.75rem"></p>
          <button id="submit" type="submit" class="btn btn-primary w-full" style="width:100%; padding:0.625rem">
            <span id="submit-label">Sign in</span>
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-text-subtle mt-4">
        Need help? <a href="https://github.com" class="underline hover:text-text">Open an issue</a>
      </p>
    </div>

    <script type="module">
      import { Spinner, ensureIcons } from '/ui.js';

      ensureIcons();

      (async () => {
        try {
          const res = await fetch('/api/auth/status').then(r => r.json());
          if (res.needs_setup) location.href = '/setup.html';
          else if (res.user) location.href = '/';
        } catch {}
      })();

      const form = document.getElementById('form');
      const errEl = document.getElementById('err');
      const submitBtn = document.getElementById('submit');
      const submitLabel = document.getElementById('submit-label');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.classList.add('hidden');
        const fd = new FormData(form);
        const body = { username: fd.get('username'), password: fd.get('password') };

        submitBtn.disabled = true;
        submitLabel.innerHTML = `${Spinner()}<span style="margin-left:0.5rem">Signing in…</span>`;

        try {
          const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (r.ok) { location.href = '/'; return; }
          const data = await r.json().catch(() => ({}));
          errEl.textContent = data.error || 'sign in failed';
          errEl.classList.remove('hidden');
        } catch (err) {
          errEl.textContent = err.message || 'network error';
          errEl.classList.remove('hidden');
        } finally {
          submitBtn.disabled = false;
          submitLabel.textContent = 'Sign in';
        }
      });
    </script>
  </body>
</html>
